name: youtube-downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: >
          Enter one or more URLs with optional arguments.
          Separate entries with newlines, commas, or spaces.
          Example:
          https://www.youtube.com/watch?v=dfdXGw1xY9A v 480
          https://www.youtube.com/watch?v=dfdXGw1xY9A v 1080
          or: https://www.youtube.com/watch?v=dfdXGw1xY9A v 480, https://... v 720
        required: true

jobs:
  actions:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true

      # ── START WARP CONTAINER (CRITICAL BYPASS) ──────────────
      - name: Start WARP Container
        run: |
          echo "Starting Cloudflare WARP container..."

          docker network create warp-net || true

          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp

          echo "Waiting for WARP to initialize (15 seconds)..."
          sleep 15

          echo "Checking WARP status..."
          for i in {1..5}; do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "WARP is active!"
              echo "$RESULT"
              break
            else
              echo "Attempt $i/5 - WARP not ready yet, waiting..."
              sleep 5
            fi
          done

          FINAL=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
          if echo "$FINAL" | grep -qE "warp=(on|plus)"; then
            echo "WARP proxy is ready!"
          else
            echo "WARP might not be fully active, but continuing anyway..."
          fi

      # ── Write YouTube cookies (optional, used as fallback) ──
      - name: Write YouTube cookies from secret
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > youtube-cookies.txt
            echo "YouTube cookies written."
          else
            echo "No YOUTUBE_COOKIES secret found – proceeding without cookies."
          fi
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      # ── Parse all entries into a JSON array ─────────────────
      - name: Parse all entries (multiple URLs/args)
        id: parse_entries
        run: |
          INPUT="${{ github.event.inputs.url }}"
          MODIFIED=$(echo "$INPUT" | tr ',' '\n')
          ENTRIES='[]'
          while IFS= read -r line; do
            line=$(echo "$line" | xargs)
            [ -z "$line" ] && continue
            tokens=($line)
            i=0
            while [ $i -lt ${#tokens[@]} ]; do
              token="${tokens[$i]}"
              if [[ "$token" =~ ^https?:// ]]; then
                link="$token"
                args=()
                i=$((i+1))
                while [ $i -lt ${#tokens[@]} ]; do
                  next="${tokens[$i]}"
                  if [[ "$next" =~ ^https?:// ]]; then
                    break
                  fi
                  args+=("$next")
                  i=$((i+1))
                done
                args_json=$(printf '%s\n' "${args[@]}" | jq -R . | jq -s .)
                entry=$(jq -n --arg link "$link" --argjson args "$args_json" '{link: $link, args: $args}')
                ENTRIES=$(echo "$ENTRIES" | jq ". + [$entry]")
              else
                i=$((i+1))
              fi
            done
          done <<< "$MODIFIED"

          ENTRIES_JSON=$(echo "$ENTRIES" | jq -c .)
          echo "ENTRIES_JSON=$ENTRIES_JSON" >> $GITHUB_OUTPUT
          IS_ANY_YT=$(echo "$ENTRIES" | jq '[.[].link | test("youtube\\.com/watch\\?v=|youtu\\.be/")] | any')
          echo "IS_ANY_YT=$IS_ANY_YT" >> $GITHUB_OUTPUT
          echo "Parsed $(echo "$ENTRIES" | jq length) entries, any YouTube? $IS_ANY_YT"

      # ── Prepare PATH for tools ─────────────────────────────
      - name: Prepare PATH for tools
        if: steps.parse_entries.outputs.IS_ANY_YT == 'true'
        run: |
          mkdir -p ~/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      # ── Install tools (yt-dlp, ffmpeg, deno) ───────────────
      - name: Install tools (if any YouTube link)
        if: steps.parse_entries.outputs.IS_ANY_YT == 'true'
        run: |
          if ! command -v yt-dlp &> /dev/null; then
            curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ~/.local/bin/yt-dlp
            chmod a+rx ~/.local/bin/yt-dlp
          fi
          if ! command -v jq &> /dev/null || ! command -v ffmpeg &> /dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq jq ffmpeg
          fi
          if ! command -v deno &> /dev/null; then
            curl -fsSL https://deno.land/install.sh | sh -s -- -y
          fi

      # ── Process all downloads with MULTIPLE BYPASS METHODS ──
      - name: Download, remux, and ZIP all files
        run: |
          set -e
          ENTRIES_JSON='${{ steps.parse_entries.outputs.ENTRIES_JSON }}'
          mkdir -p youtube-content youtube

          # Common flags for ALL methods
          COMMON_FLAGS="--no-cache-dir --no-part --no-playlist --retries 10 --fragment-retries 10 --no-check-certificates --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M --progress --newline"

          # Function to try multiple download methods (from Persian workflow)
          download_with_bypass() {
            local URL="$1"
            local TMP_DIR="$2"
            local FORMAT="$3"
            local QUALITY_TYPE="$4"

            for METHOD in 1 2 3 4 5 6 7 8; do
              echo "Trying method $METHOD for: $URL"
              
              case $METHOD in
                1)
                  yt-dlp \
                    --proxy "socks5://127.0.0.1:1080" \
                    --format "$FORMAT" \
                    $COMMON_FLAGS \
                    --extractor-args "youtube:player_client=web" \
                    --js-runtimes deno \
                    --remote-components ejs:github \
                    --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
                    -o "${TMP_DIR}/%(title)s.%(ext)s" \
                    "$URL" && return 0
                  ;;
                2)
                  yt-dlp \
                    --proxy "socks5://127.0.0.1:1080" \
                    --format "$FORMAT" \
                    $COMMON_FLAGS \
                    --extractor-args "youtube:player_client=web" \
                    --js-runtimes deno \
                    --remote-components ejs:npm \
                    -o "${TMP_DIR}/%(title)s.%(ext)s" \
                    "$URL" && return 0
                  ;;
                3)
                  yt-dlp \
                    --proxy "socks5://127.0.0.1:1080" \
                    --format "$FORMAT" \
                    $COMMON_FLAGS \
                    --extractor-args "youtube:player_client=web,mweb,android_vr" \
                    --js-runtimes deno \
                    --remote-components ejs:github \
                    -o "${TMP_DIR}/%(title)s.%(ext)s" \
                    "$URL" && return 0
                  ;;
                4)
                  yt-dlp \
                    --proxy "socks5://127.0.0.1:1080" \
                    --format "$FORMAT" \
                    $COMMON_FLAGS \
                    --extractor-args "youtube:player_client=mweb" \
                    -o "${TMP_DIR}/%(title)s.%(ext)s" \
                    "$URL" && return 0
                  ;;
                5)
                  yt-dlp \
                    --proxy "socks5://127.0.0.1:1080" \
                    --format "$FORMAT" \
                    $COMMON_FLAGS \
                    --extractor-args "youtube:player_client=android_vr" \
                    -o "${TMP_DIR}/%(title)s.%(ext)s" \
                    "$URL" && return 0
                  ;;
                6)
                  yt-dlp \
                    --format "$FORMAT" \
                    $COMMON_FLAGS \
                    --extractor-args "youtube:player_client=web" \
                    --js-runtimes deno \
                    --remote-components ejs:github \
                    -o "${TMP_DIR}/%(title)s.%(ext)s" \
                    "$URL" && return 0
                  ;;
                7)
                  yt-dlp \
                    --format "$FORMAT" \
                    $COMMON_FLAGS \
                    --extractor-args "youtube:player_client=mweb" \
                    -o "${TMP_DIR}/%(title)s.%(ext)s" \
                    "$URL" && return 0
                  ;;
                8)
                  yt-dlp \
                    --proxy "socks5://127.0.0.1:1080" \
                    --format "$FORMAT" \
                    $COMMON_FLAGS \
                    --extractor-args "youtube:player_client=android" \
                    --user-agent "Mozilla/5.0 (Linux; Android 12; SM-S906N Build/QP1A.190711.020) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 Mobile Safari/537.36" \
                    -o "${TMP_DIR}/%(title)s.%(ext)s" \
                    "$URL" && return 0
                  ;;
              esac
              echo "Method $METHOD failed, waiting 3 seconds..."
              sleep 3
            done
            return 1
          }

          # ── Loop over entries ─────────────────────────────
          count=$(echo "$ENTRIES_JSON" | jq length)
          for ((idx=0; idx<count; idx++)); do
            entry=$(echo "$ENTRIES_JSON" | jq ".[$idx]")
            link=$(echo "$entry" | jq -r '.link')
            args_len=$(echo "$entry" | jq '.args | length')

            type="v"
            val1="max"
            val2=""
            if [ "$args_len" -ge 1 ]; then
              type=$(echo "$entry" | jq -r '.args[0]')
            fi
            if [ "$args_len" -ge 2 ]; then
              val1=$(echo "$entry" | jq -r '.args[1]')
            fi
            if [ "$args_len" -ge 3 ]; then
              val2=$(echo "$entry" | jq -r '.args[2]')
            fi

            if [[ "$type" != "v" && "$type" != "a" ]]; then
              echo "Invalid type '$type' – defaulting to v(ideo) max"
              type="v"; val1="max"; val2=""
            fi

            # Build format string based on quality
            if [ "$type" = "v" ]; then
              case "$val1" in
                "max"|"best")
                  FORMAT="bestvideo+bestaudio/best" ;;
                "min"|"worst")
                  FORMAT="worstvideo+worstaudio/worst" ;;
                *)
                  FORMAT="bestvideo[height<=$val1]+bestaudio/best[height<=$val1]" ;;
              esac
            else
              FORMAT="bestaudio/best"
            fi

            echo "----------------------------------------"
            echo "Processing entry $((idx+1))/$count: $link ($type $val1 $val2)"

            if echo "$link" | grep -Eq '(youtube\.com/watch\?v=|youtu\.be/)'; then
              TMP_DIR="temp_$idx"
              mkdir -p "$TMP_DIR"

              if download_with_bypass "$link" "$TMP_DIR" "$FORMAT" "$type"; then
                echo "Download successful!"
                # Move file to youtube-content
                mv "$TMP_DIR"/* youtube-content/
                rm -rf "$TMP_DIR"
              else
                echo "All 8 methods failed for: $link"
                rm -rf "$TMP_DIR"
                continue
              fi
            else
              echo "Non‑YouTube link: $link"
              cd youtube-content
              wget --progress=bar:force --content-disposition "$link" || echo "wget failed, skipping."
              cd ..
            fi
          done

          # ── ZIP each file (split into 99MB parts) ─────────
          echo "========================================"
          echo "Creating split ZIP archives for each file..."
          cd youtube-content
          for file in *; do
            if [ -f "$file" ]; then
              echo "→ Zipping $file"
              zip -j -s 99m -r "../youtube/${file}.zip" "$file"
            fi
          done
          cd ..

      # ── Stop WARP Container ────────────────────────────────
      - name: Stop WARP Container
        if: always()
        run: |
          docker stop warp || true
          docker rm warp || true

      # ── Upload all ZIP parts ───────────────────────────────
      - name: Upload to youtube folder
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git config http.postBuffer 524288000

          FILES=(youtube/*)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No files to upload."
            exit 0
          fi

          git add youtube/
          git commit -m "Add download parts [skip ci]" || echo "Nothing to commit"

          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            echo "Push attempt $i..."
            git pull --rebase --autostash origin "$BRANCH"
            if git push origin "$BRANCH"; then
              echo "Push succeeded."
              break
            else
              if [ $i -lt $RETRIES ]; then
                echo "Push rejected, retrying in 3 seconds..."
                sleep 3
              else
                echo "Push failed after $RETRIES attempts."
                exit 1
              fi
            fi
          done
          echo "All files uploaded to the 'youtube' folder."
